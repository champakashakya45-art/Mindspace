name: mindspace
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.5
  confetti: ^0.7.0
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  http: ^1.2.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mood.jpg
    - assets/images/patterns.jpg
    - assets/images/journey.jpg
    - assets/images/login_bg.jpg